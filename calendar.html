<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベントカレンダー｜穂の香ホール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=Madimi+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: #FEFFEA; }
    .page-main { background: linear-gradient(to bottom, #FEFFEA, #FCFFD7); }

    /* ===== PAGE TITLE ===== */
    .page-title-section {
      padding: 2rem 1.5rem 0;
      max-width: 960px;
      margin: 0 auto;
    }
    .page-title-en {
      font-family: 'Madimi One', sans-serif;
      font-size: clamp(2rem, 8vw, 3rem);
      color: #B3C399;
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .page-title-ja {
      font-size: 0.85rem;
      color: var(--text);
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
    }

    /* ===== MONTH NAV ===== */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 1.5rem 1.5rem 1rem;
      max-width: 960px;
      margin: 0 auto;
    }
    .nav-btn {
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: filter 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    #prevBtn { background: linear-gradient(to right, #CDD866, #B3C399); }
    #nextBtn { background: linear-gradient(to right, #B3C399, #CDD866); }
    .nav-btn:hover { filter: brightness(0.92); transform: scale(1.08); }
    .nav-selects {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-select-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      background: var(--surface);
      border-radius: 999px;
      padding: 0.3rem 1.6rem 0.3rem 0.9rem;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
    }
    .nav-select-wrap select {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.001;
      border: none;
      background: transparent;
      cursor: pointer;
      outline: none;
    }
    .nav-select-label {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      pointer-events: none;
      white-space: nowrap;
    }
    .nav-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 0.55rem;
      font-size: 0.65rem;
      color: #B3C399;
      pointer-events: none;
    }
    .nav-sep {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ===== DATE LIST ===== */
    .calendar-list {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .date-row {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .date-row:last-child { border-bottom: none; }
    .date-label {
      flex-shrink: 0;
      width: 64px;
      text-align: left;
    }
    .date-label .date-num {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      display: block;
    }
    .date-label .date-dow {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .date-label.is-sun .date-num { color: var(--sun); }
    .date-label.is-sat .date-num { color: var(--sat); }
    .date-events {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .event-item {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      cursor: pointer;
    }
    .event-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      color: #fff;
      align-self: flex-start;
      background: linear-gradient(to bottom, #B3C399, #CDD866) !important;
    }
    .event-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }
    .event-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .event-meta span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .event-item:hover .event-name { color: #D3689E; }

    /* ===== TOP BUTTON ===== */
    .top-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: none;
      border-radius: 12px;
      width: 52px;
      height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--text);
      box-shadow: var(--shadow-md);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.2s;
      line-height: 1.2;
      letter-spacing: 0.04em;
    }
    .top-btn.visible { opacity: 1; pointer-events: all; }
    .top-btn:hover { transform: translateY(-2px); }
    .top-btn-arrow { font-size: 0.85rem; line-height: 1; }
  </style>
</head>
<body>

<header id="siteHeader"></header>

<div class="page-main">
<div class="page-title-section">
  <p class="page-title-en">EVENT CALENDAR</p>
  <p class="page-title-ja">イベントカレンダー</p>
</div>

<div class="month-nav">
  <button class="nav-btn" id="prevBtn">&#8249;</button>
  <div class="nav-selects">
    <div class="nav-select-wrap">
      <select id="yearSelect"></select>
      <span class="nav-select-label" id="yearLabel"></span>
    </div>
    <span class="nav-sep">年</span>
    <div class="nav-select-wrap">
      <select id="monthSelect"></select>
      <span class="nav-select-label" id="monthLabel"></span>
    </div>
    <span class="nav-sep">月</span>
  </div>
  <button class="nav-btn" id="nextBtn">&#8250;</button>
</div>

<div class="calendar-list" id="calendarList"></div>
</div><!-- /page-main -->

<!-- TOPボタン -->
<button class="top-btn" id="topBtn">
  <span class="top-btn-arrow">^</span>
  <span>TOP</span>
</button>

<!-- フッター -->
<footer class="site-footer" id="siteFooter"></footer>

<script src="shared.js"></script>
<script>
initHeader();
initFooter();
initModal();

const now = new Date();
let currentYear  = now.getFullYear();
let currentMonth = now.getMonth();

// ---- セレクタ初期化 ----
const yearSelect  = document.getElementById('yearSelect');
const monthSelect = document.getElementById('monthSelect');
for (let y = currentYear - 1; y <= currentYear + 2; y++) {
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y;
  if (y === currentYear) opt.selected = true;
  yearSelect.appendChild(opt);
}
for (let m = 1; m <= 12; m++) {
  const opt = document.createElement('option');
  opt.value = m - 1; opt.textContent = m;
  if (m - 1 === currentMonth) opt.selected = true;
  monthSelect.appendChild(opt);
}
function syncLabels() {
  document.getElementById('yearLabel').textContent = currentYear;
  document.getElementById('monthLabel').textContent = currentMonth + 1;
}
syncLabels();

yearSelect.addEventListener('change', () => {
  currentYear = parseInt(yearSelect.value);
  syncLabels();
  renderList();
});
monthSelect.addEventListener('change', () => {
  currentMonth = parseInt(monthSelect.value);
  syncLabels();
  renderList();
});

// ---- データ取得 ----
loadFromSheet(renderList);

// ---- リスト描画 ----
function renderList() {
  // セレクタ同期
  yearSelect.value  = currentYear;
  monthSelect.value = currentMonth;
  syncLabels();

  const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
  const list = document.getElementById('calendarList');
  list.innerHTML = '';

  for (let d = 1; d <= lastDate; d++) {
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const dayEvs = getEventsForDay(currentYear, currentMonth, d);

    const row = document.createElement('div');
    row.className = 'date-row';

    const dowClass = dow === 0 ? 'is-sun' : dow === 6 ? 'is-sat' : '';
    row.innerHTML = `
      <div class="date-label ${dowClass}">
        <span class="date-num">${currentMonth + 1}/${d}</span>
        <span class="date-dow">${DAYS_JA[dow]}</span>
      </div>
      <div class="date-events" id="evs-${d}"></div>
    `;
    list.appendChild(row);

    const evsContainer = row.querySelector(`#evs-${d}`);
    dayEvs.forEach(ev => {
      const idx = events.indexOf(ev);
      const item = document.createElement('div');
      item.className = 'event-item';
      item.innerHTML = `
        <span class="event-badge cat-${ev.cat}">${CONFIG.CATEGORIES[ev.cat]}</span>
        <span class="event-name">${ev.name}</span>
        <div class="event-meta">
          ${ev.time  ? `<span>🕐 ${ev.time}</span>` : ''}
          ${ev.place ? `<span>📍 ${ev.place}</span>` : ''}
        </div>
      `;
      item.addEventListener('click', () => openModal(idx));
      evsContainer.appendChild(item);
    });
  }
}

// ---- 月ナビ ----
document.getElementById('prevBtn').addEventListener('click', () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderList();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderList();
});

// ---- TOPボタン ----
const topBtn = document.getElementById('topBtn');
window.addEventListener('scroll', () => {
  topBtn.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });
topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
</body>
</html>
